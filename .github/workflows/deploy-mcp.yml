name: Deploy MCP HTTP

on:
  push:
    branches:
      - main
    paths:
      - 'packages/mcp/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build HTTP
        run: pnpm --filter @qnx/mcp run build:http

      - name: Push to deployment repo
        run: |
          git clone https://x-access-token:${{ secrets.DEPLOY_REPO_TOKEN }}@github.com/${{ secrets.DEPLOY_REPO }} deploy-repo
          cp -r packages/mcp/http/. deploy-repo/
          cd deploy-repo
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git config user.name "${{ github.actor }}"
          git add .
          git diff --staged --quiet && echo "No changes to deploy" && exit 0
          git commit -m "deploy: ${{ github.sha }}"
          git push
